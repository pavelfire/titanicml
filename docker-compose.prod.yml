services:
  api:
    image: ghcr.io/pavelfire/titanicml:latest
    restart: unless-stopped
    expose:
      - "5026"
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST}
      VIRTUAL_PORT: "5026"
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - web

networks:
  web:
    external: true
